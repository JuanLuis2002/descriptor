<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SGUEES - Panel de Control</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        body { overflow-x: hidden; background-color: #f8f9fa; }
        #wrapper { display: flex; width: 100vw; height: 100vh; }
        #sidebar-wrapper { min-height: 100vh; width: 270px; background-color: #1e2229; flex-shrink: 0; }
        #sidebar-wrapper .sidebar-heading { padding: 1.5rem 1rem; color: #fff; border-bottom: 1px solid #2d323e; }
        #sidebar-wrapper .list-group-item { padding: 0.75rem 1.5rem; color: #a2a6b0; background-color: transparent; border: none; }
        #sidebar-wrapper .list-group-item:hover { color: #fff; background-color: #2d323e; }
        #sidebar-wrapper .list-group-item.active { color: #fff; background-color: #0d6efd; font-weight: bold; }
        #page-content-wrapper { width: 100%; display: flex; flex-direction: column; overflow-y: auto; }
    </style>
    <script>
        // Guardia de Seguridad Síncrona Implacable
        if (sessionStorage.getItem('sesion_activa') !== 'true') {
            window.location.href = 'login.html';
        }
        // Función global de escape rápida para asegurar el funcionamiento del Logout
        function forzarCierreSesion() {
            sessionStorage.clear();
            window.location.href = 'login.html';
        }
    </script>
</head>
<body>

    <div id="wrapper">
        <div id="sidebar-wrapper" class="shadow">
            <div class="sidebar-heading fw-bold d-flex align-items-center gap-2">
                <i class="bi bi-mortarboard-fill text-primary fs-4"></i>
                <div>
                    <span class="d-block lh-1 fs-6">Estructura Orgánica</span>
                    <small class="text-muted fw-normal" style="font-size: 11px;">Portal Descriptores UEES</small>
                </div>
            </div>
            <div class="list-group list-group-flush mt-3" id="menu-lateral">
                </div>
        </div>

        <div id="page-content-wrapper">
            <nav class="navbar navbar-expand-lg navbar-light bg-white border-bottom px-4 py-2 shadow-sm">
                <div class="container-fluid p-0">
                    <div class="d-flex flex-column">
                        <span class="fw-bold text-dark p-0 m-0" id="txtNombreUsuario">---</span>
                        <small class="text-muted p-0 m-0" id="txtCargoUsuario" style="font-size: 12px; margin-top: -3px !important;">---</small>
                    </div>
                    <div class="ms-auto">
                        <button class="btn btn-outline-danger btn-sm fw-bold px-3" onclick="forzarCierreSesion()">
                            Salir <i class="bi bi-box-arrow-right ms-1"></i>
                        </button>
                    </div>
                </div>
            </nav>

            <main class="container-fluid p-4 flex-grow-1" id="content-area">
                </main>

            <footer class="bg-white border-top text-center py-3 text-muted small">
                <strong>&copy; 2026 SGUEES</strong> - Módulo de Descriptores Normalizado.
            </footer>
        </div>
    </div>

    <script type="module" src="js/app.js"></script>
</body>
</html>
