<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Gestor de Descriptor de Puesto</title>
    <!-- Bootstrap 5.3 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- DataTables -->
    <link href="https://cdn.datatables.net/1.13.4/css/dataTables.bootstrap5.min.css" rel="stylesheet">
    <!-- CSS Personalizado -->
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <!-- Sidebar -->
    <div class="sidebar">
        <div class="sidebar-header">
            <h4><i class="fas fa-clipboard-list me-2"></i> Descriptor</h4>
            <small>Sistema de Gestión</small>
        </div>
        <div class="sidebar-user">
            <div class="user-avatar">
                <i class="fas fa-user-circle fa-3x"></i>
            </div>
            <div class="user-info-sidebar" id="userInfoSidebar">
                <strong>Cargando...</strong>
                <small></small>
            </div>
        </div>
        <nav class="sidebar-nav">
            <a href="#" class="nav-link active" data-page="dashboard">
                <i class="fas fa-tachometer-alt"></i> Dashboard
            </a>
            <a href="#" class="nav-link" data-page="descriptores">
                <i class="fas fa-file-alt"></i> Descriptores
            </a>
            <a href="#" class="nav-link" data-page="crear-descriptor">
                <i class="fas fa-plus-circle"></i> Nuevo Descriptor
            </a>
            <a href="#" class="nav-link" data-page="competencias">
                <i class="fas fa-graduation-cap"></i> Diccionario Competencias
            </a>
            <a href="#" class="nav-link" data-page="mi-perfil">
                <i class="fas fa-user"></i> Mi Perfil
            </a>
        </nav>
        <div class="sidebar-footer">
            <a href="#" id="btnLogout" class="btn-logout">
                <i class="fas fa-sign-out-alt"></i> Cerrar Sesión
            </a>
        </div>
    </div>

    <!-- Main Content -->
    <div class="main-content">
        <nav class="top-navbar">
            <button class="btn-toggle-sidebar" id="toggleSidebar">
                <i class="fas fa-bars"></i>
            </button>
            <div class="navbar-title">
                <span id="pageTitle">Dashboard Principal</span>
            </div>
            <div class="navbar-user">
                <span id="userNameDisplay"></span>
                <div class="user-role-badge" id="userRoleBadge"></div>
            </div>
        </nav>

        <div class="content-container" id="contentContainer">
            <!-- El contenido se cargará dinámicamente aquí -->
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.datatables.net/1.13.4/js/jquery.dataTables.min.js"></script>
    <script src="https://cdn.datatables.net/1.13.4/js/dataTables.bootstrap5.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="js/main.js"></script>
</body>
</html>
