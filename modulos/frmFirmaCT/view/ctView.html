<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        .stats-card {
            background: white;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            text-align: center;
        }
        .stats-number {
            font-size: 32px;
            font-weight: bold;
            color: #0d6efd;
        }
        .stats-label {
            color: #6c757d;
            font-size: 14px;
        }
    </style>
</head>
<body>

<div class="row mb-4">
    <div class="col-md-12">
        <div class="stats-card">
            <div class="stats-number" id="totalPendientes">0</div>
            <div class="stats-label">Descriptores Pendientes de su Firma</div>
        </div>
    </div>
</div>

<div id="pendientesContainer">
    <div class="text-center py-5">
        <i class="fas fa-spinner fa-spin fa-2x text-primary"></i>
        <p class="mt-2">Cargando descriptores pendientes...</p>
    </div>
</div>

<script>
function actualizarContador() {
    if (typeof CTService !== 'undefined') {
        var currentUser = JSON.parse(sessionStorage.getItem('currentUser') || '{}');
        var pendientes = CTService.getPendientesFirma(currentUser.nombre);
        $('#totalPendientes').text(pendientes.length);
    }
}

$(document).ready(function() {
    actualizarContador();
});
</script>
</body>
</html>
