<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        .descriptor-card { background: white; border-radius: 15px; padding: 20px; margin-bottom: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); transition: all 0.3s; cursor: pointer; }
        .descriptor-card:hover { transform: translateY(-3px); box-shadow: 0 8px 20px rgba(0,0,0,0.1); }
        .status-badge { padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: 600; }
        .status-borrador { background: #6c757d; color: white; }
        .status-enviado_jf { background: #0dcaf0; color: #000; }
        .status-observado_jf { background: #ffc107; color: #000; }
        .status-observado_th { background: #ffc107; color: #000; }
        .status-aprobado_jf { background: #20c997; color: white; }
        .status-enviado_th { background: #fd7e14; color: white; }
        .status-activo { background: #198754; color: white; }
        .status-firma_jth_completada { background: #0d6efd; color: white; }
        .status-firma_ct_completada { background: #6f42c1; color: white; }
        .status-firmado { background: #198754; color: white; }
        .filtro-busqueda { background: white; border-radius: 12px; padding: 15px; margin-bottom: 20px; }
        .stats-bar { background: white; border-radius: 12px; padding: 15px; margin-bottom: 20px; }
        .stat-item { text-align: center; border-right: 1px solid #dee2e6; }
        .stat-item:last-child { border-right: none; }
        .stat-number { font-size: 24px; font-weight: bold; color: #0d6efd; }
        .stat-label { font-size: 12px; color: #6c757d; }
        .observacion-box { background: #fff3cd; border-left: 4px solid #ffc107; padding: 10px; margin-top: 10px; border-radius: 5px; font-size: 12px; }
        .auditoria-item { padding: 10px; border-bottom: 1px solid #dee2e6; }
        .auditoria-item:last-child { border-bottom: none; }
        .auditoria-fecha { font-size: 11px; color: #6c757d; }
        .auditoria-accion { font-weight: bold; }
        .auditoria-usuario { color: #0d6efd; }
        .auditoria-estado { font-size: 11px; padding: 2px 6px; border-radius: 10px; display: inline-block; margin-left: 8px; }
        @media (max-width: 768px) { .stat-item { border-right: none; margin-bottom: 10px; } }
    </style>
</head>
<body>
<div class="stats-bar">
    <div class="row text-center">
        <div class="col-6 col-md-2 stat-item"><div class="stat-number" id="statTotal">0</div><div class="stat-label">Total</div></div>
        <div class="col-6 col-md-2 stat-item"><div class="stat-number" id="statBorradores">0</div><div class="stat-label">Borradores</div></div>
        <div class="col-6 col-md-2 stat-item"><div class="stat-number" id="statEnviadosJF">0</div><div class="stat-label">Enviados a JF</div></div>
        <div class="col-6 col-md-2 stat-item"><div class="stat-number" id="statObservadosJF">0</div><div class="stat-label">Observados por JF</div></div>
        <div class="col-6 col-md-2 stat-item"><div class="stat-number" id="statObservadosTH">0</div><div class="stat-label">Observados por TH</div></div>
        <div class="col-6 col-md-2 stat-item"><div class="stat-number" id="statAprobadosJF">0</div><div class="stat-label">Aprobados por JF</div></div>
        <div class="col-6 col-md-2 stat-item"><div class="stat-number" id="statEnviadosTH">0</div><div class="stat-label">Enviados a TH</div></div>
        <div class="col-6 col-md-2 stat-item"><div class="stat-number" id="statActivos">0</div><div class="stat-label">Activos</div></div>
        <div class="col-6 col-md-2 stat-item"><div class="stat-number" id="statFirmados">0</div><div class="stat-label">Firmados</div></div>
    </div>
</div>

<div class="filtro-busqueda">
    <div class="row g-3">
        <div class="col-md-4"><label class="form-label small">Buscar</label><input type="text" class="form-control" id="searchInput" placeholder="Por puesto, código o área..."></div>
        <div class="col-md-3"><label class="form-label small">Estado</label><select class="form-select" id="estadoFilter"><option value="">Todos</option><option value="BORRADOR">Borrador</option><option value="ENVIADO_JF">Enviado a JF</option><option value="OBSERVADO_JF">Observado por JF</option><option value="OBSERVADO_TH">Observado por TH</option><option value="APROBADO_POR_JF">Aprobado por JF</option><option value="ENVIADO_TH">Enviado a TH</option><option value="ACTIVO">Activo</option><option value="FIRMA_JTH_COMPLETADA">Firma JTH</option><option value="FIRMA_CT_COMPLETADA">Firma Colaborador</option><option value="FIRMADO">Firmado</option></select></div>
        <div class="col-md-3"><label class="form-label small">Ordenar por</label><select class="form-select" id="sortBy"><option value="fecha">Fecha (reciente)</option><option value="puesto">Puesto (A-Z)</option><option value="estado">Estado</option></select></div>
        <div class="col-md-2 d-flex align-items-end"><button class="btn btn-primary w-100" id="btnNuevoDescriptor"><i class="fas fa-plus"></i> Nuevo</button></div>
    </div>
</div>

<div id="descriptoresListContainer"><div class="text-center py-5"><i class="fas fa-spinner fa-spin fa-2x text-primary"></i><p>Cargando...</p></div></div>

<script>
window.initDescriptorList = function() {
    if (window._listInitialized === true) {
        console.log('Lista ya inicializada, omitiendo');
        return;
    }
    window._listInitialized = true;
    console.log('Inicializando lista de descriptores...');
    
    var currentUser = JSON.parse(sessionStorage.getItem('currentUser') || '{}');
    var allDescriptors = [];
    
    function cargarDescriptores() {
        if (typeof DescriptorListService !== 'undefined') {
            allDescriptors = DescriptorListService.getByCreador(currentUser.nombre);
            actualizarEstadisticas();
            filtrarYMostrar();
        } else {
            $('#descriptoresListContainer').html('<div class="alert alert-danger">Error al cargar los descriptores</div>');
        }
    }
    
    function actualizarEstadisticas() {
        if (typeof DescriptorListService !== 'undefined') {
            var stats = DescriptorListService.getEstadisticas(currentUser.nombre);
            $('#statTotal').text(stats.total);
            $('#statBorradores').text(stats.borradores);
            $('#statEnviadosJF').text(stats.enviadosJF || 0);
            $('#statObservadosJF').text(stats.observadosJF || 0);
            $('#statObservadosTH').text(stats.observadosTH || 0);
            $('#statAprobadosJF').text(stats.aprobadosJF || 0);
            $('#statEnviadosTH').text(stats.enviadosTH || 0);
            $('#statActivos').text(stats.activos);
            $('#statFirmados').text(stats.firmados);
        }
    }
    
    function filtrarYMostrar() {
        var filtered = [...allDescriptors];
        var searchTerm = $('#searchInput').val();
        if (searchTerm && typeof DescriptorListService !== 'undefined') {
            filtered = DescriptorListService.search(filtered, searchTerm);
        }
        var estado = $('#estadoFilter').val();
        if (estado && typeof DescriptorListService !== 'undefined') {
            filtered = DescriptorListService.filterByEstado(filtered, estado);
        }
        var sortBy = $('#sortBy').val();
        if (typeof DescriptorListService !== 'undefined') {
            filtered = DescriptorListService.sort(filtered, sortBy);
        }
        mostrarLista(filtered);
    }
    
    function mostrarLista(descriptores) {
        var container = $('#descriptoresListContainer');
        if (descriptores.length === 0) {
            container.html('<div class="text-center py-5"><i class="fas fa-folder-open fa-3x text-muted mb-3"></i><h5>No hay descriptores</h5><button class="btn btn-primary" onclick="window.cargarNuevoDescriptor()"><i class="fas fa-plus"></i> Crear primero</button></div>');
            return;
        }
        
        var html = '<div class="row">';
        for (var i = 0; i < descriptores.length; i++) {
            var d = descriptores[i];
            var fecha = d.fechaEmision || (d.fechaCreacion ? d.fechaCreacion.split('T')[0] : '-');
            
            var estadoClass = '';
            var estadoTexto = '';
            
            switch(d.estado) {
                case 'BORRADOR':
                    estadoClass = 'borrador';
                    estadoTexto = 'Borrador';
                    break;
                case 'ENVIADO_JF':
                    estadoClass = 'enviado_jf';
                    estadoTexto = 'Enviado a JF';
                    break;
                case 'OBSERVADO_JF':
                    estadoClass = 'observado_jf';
                    estadoTexto = 'Observado por JF';
                    break;
                case 'OBSERVADO_TH':
                    estadoClass = 'observado_th';
                    estadoTexto = 'Observado por TH';
                    break;
                case 'APROBADO_POR_JF':
                    estadoClass = 'aprobado_jf';
                    estadoTexto = 'Aprobado por JF';
                    break;
                case 'ENVIADO_TH':
                    estadoClass = 'enviado_th';
                    estadoTexto = 'Enviado a TH';
                    break;
                case 'ACTIVO':
                    estadoClass = 'activo';
                    estadoTexto = 'Activo';
                    break;
                case 'FIRMA_JTH_COMPLETADA':
                    estadoClass = 'firma_jth_completada';
                    estadoTexto = 'Firma JTH';
                    break;
                case 'FIRMA_CT_COMPLETADA':
                    estadoClass = 'firma_ct_completada';
                    estadoTexto = 'Firma Colaborador';
                    break;
                case 'FIRMADO':
                    estadoClass = 'firmado';
                    estadoTexto = 'Firmado';
                    break;
                default:
                    estadoClass = 'borrador';
                    estadoTexto = 'Borrador';
            }
            
            html += '<div class="col-12 col-md-6 col-lg-4 mb-3"><div class="descriptor-card" data-id="' + d.id + '">' +
                '<div class="d-flex justify-content-between align-items-start mb-3">' +
                '<div><h6 class="mb-0">' + (d.codigo || 'DES-' + d.id) + '</h6><small class="text-muted">' + fecha + '</small></div>' +
                '<span class="status-badge status-' + estadoClass + '">' + estadoTexto + '</span></div>' +
                '<h5 class="mb-2">' + (d.puesto || 'Sin título') + '</h5>' +
                '<p class="text-muted small mb-3"><i class="fas fa-building"></i> ' + (d.area || 'N/A') + '<br>' +
                '<i class="fas fa-chart-line"></i> Reporta a: ' + (d.reportaA || 'N/A') + '</p>';
            
            if ((d.estado === 'OBSERVADO_JF' && d.observacionesJF) || (d.estado === 'OBSERVADO_TH' && d.observacionesTH)) {
                var obsTexto = d.estado === 'OBSERVADO_JF' ? d.observacionesJF : d.observacionesTH;
                var obsOrigen = d.estado === 'OBSERVADO_JF' ? 'Jefe Superior' : 'Talento Humano';
                html += '<div class="observacion-box"><i class="fas fa-comment me-1"></i> <strong>Observaciones (' + obsOrigen + '):</strong><br>' + obsTexto + '</div>';
            }
            
            html += '<div class="d-flex justify-content-end gap-2 mt-2">' +
                '<button class="btn btn-sm btn-outline-info btn-ver" data-id="' + d.id + '"><i class="fas fa-eye"></i> Ver</button>' +
                '<button class="btn btn-sm btn-outline-secondary btn-auditoria" data-id="' + d.id + '"><i class="fas fa-history"></i> Auditoría</button>';
            
            if (d.estado === 'BORRADOR' || d.estado === 'OBSERVADO_JF' || d.estado === 'OBSERVADO_TH') {
                html += '<button class="btn btn-sm btn-outline-warning btn-editar" data-id="' + d.id + '"><i class="fas fa-edit"></i> Editar</button>';
            }
            
            if (d.estado === 'BORRADOR') {
                html += '<button class="btn btn-sm btn-outline-primary btn-enviar" data-id="' + d.id + '"><i class="fas fa-paper-plane"></i> Enviar a JF</button>';
            }
            
            if (d.estado === 'APROBADO_POR_JF') {
                html += '<button class="btn btn-sm btn-success btn-enviar-th" data-id="' + d.id + '"><i class="fas fa-paper-plane"></i> Enviar a TH</button>';
            }
            
            if (d.estado === 'OBSERVADO_TH') {
                html += '<button class="btn btn-sm btn-success btn-enviar-th-directo" data-id="' + d.id + '"><i class="fas fa-paper-plane"></i> Reenviar a TH</button>';
            }
            
            if (d.estado === 'FIRMA_CT_COMPLETADA') {
                html += '<button class="btn btn-sm btn-primary btn-firmar-ji" data-id="' + d.id + '"><i class="fas fa-signature"></i> Firmar</button>';
            }
            
            html += '</div></div></div>';
        }
        html += '</div>';
        container.html(html);
        
        $('.btn-ver').off('click').on('click', function(e) { e.stopPropagation(); verDescriptor($(this).data('id')); });
        $('.btn-auditoria').off('click').on('click', function(e) { e.stopPropagation(); verAuditoria($(this).data('id')); });
        $('.btn-editar').off('click').on('click', function(e) { e.stopPropagation(); editarDescriptor($(this).data('id')); });
        $('.btn-enviar').off('click').on('click', function(e) { e.stopPropagation(); enviarDescriptor($(this).data('id')); });
        $('.btn-enviar-th').off('click').on('click', function(e) { e.stopPropagation(); enviarDescriptorATH($(this).data('id')); });
        $('.btn-enviar-th-directo').off('click').on('click', function(e) { e.stopPropagation(); enviarDescriptorATHDesdeObservado($(this).data('id')); });
        $('.btn-firmar-ji').off('click').on('click', function(e) { e.stopPropagation(); firmarDescriptorJI($(this).data('id')); });
        $('.descriptor-card').off('click').on('click', function(e) { if (!$(e.target).closest('.btn').length) verDescriptor($(this).data('id')); });
    }
    
    function verAuditoria(id) {
        if (typeof DescriptorService === 'undefined') return;
        var descriptor = DescriptorService.getById(id);
        if (!descriptor) return;
        
        var auditoria = descriptor.auditoria || { historial: [] };
        var historial = auditoria.historial || [];
        
        historial.sort(function(a, b) { return new Date(a.fecha) - new Date(b.fecha); });
        
        var html = '<div class="text-start" style="max-height: 500px; overflow-y: auto;">';
        html += '<div class="alert alert-info mb-3"><strong>Descriptor:</strong> ' + descriptor.codigo + '<br><strong>Puesto:</strong> ' + descriptor.puesto + '<br><strong>Estado actual:</strong> <span class="badge bg-primary">' + (descriptor.estado || 'BORRADOR') + '</span></div>';
        html += '<h6 class="border-bottom pb-2">Línea de tiempo del proceso</h6>';
        
        if (historial.length === 0) {
            html += '<p class="text-muted text-center">No hay eventos registrados</p>';
        } else {
            for (var i = 0; i < historial.length; i++) {
                var ev = historial[i];
                var fechaFormateada = new Date(ev.fecha).toLocaleString();
                var estadoBadge = '';
                if (ev.estado) {
                    var estadoClass = '';
                    switch(ev.estado) {
                        case 'BORRADOR': estadoClass = 'bg-secondary'; break;
                        case 'ENVIADO_JF': estadoClass = 'bg-info'; break;
                        case 'OBSERVADO_JF': estadoClass = 'bg-warning'; break;
                        case 'OBSERVADO_TH': estadoClass = 'bg-warning'; break;
                        case 'APROBADO_POR_JF': estadoClass = 'bg-success'; break;
                        case 'ENVIADO_TH': estadoClass = 'bg-primary'; break;
                        case 'ACTIVO': estadoClass = 'bg-success'; break;
                        case 'FIRMADO': estadoClass = 'bg-dark'; break;
                        default: estadoClass = 'bg-secondary';
                    }
                    estadoBadge = ' <span class="badge ' + estadoClass + ' auditoria-estado">' + ev.estado + '</span>';
                }
                
                html += '<div class="auditoria-item">' +
                    '<div class="auditoria-fecha"><i class="far fa-calendar-alt me-1"></i> ' + fechaFormateada + '</div>' +
                    '<div class="auditoria-accion">' + (ev.accion || 'Evento') + estadoBadge + '</div>' +
                    '<div class="auditoria-usuario"><i class="fas fa-user me-1"></i> ' + (ev.usuario || 'Sistema') + '</div>';
                
                if (ev.observacion) {
                    html += '<div class="alert alert-warning mt-2 mb-0 p-2 small"><i class="fas fa-comment"></i> <strong>Observación:</strong> ' + ev.observacion + '</div>';
                }
                
                html += '</div>';
            }
        }
        
        html += '<hr><h6 class="border-bottom pb-2">Resumen de Firmas</h6>';
        
        var firmas = [
            { nombre: 'Jefe Inmediato', estado: descriptor.firmaJI ? 'Firmado' : 'Pendiente' },
            { nombre: 'Jefe de Talento Humano', estado: descriptor.firmaJTH ? 'Firmado' : 'Pendiente' },
            { nombre: 'Colaborador/Titular', estado: descriptor.firmaCT ? 'Firmado' : 'Pendiente' }
        ];
        
        for (var f = 0; f < firmas.length; f++) {
            var icono = firmas[f].estado === 'Firmado' ? '<i class="fas fa-check-circle text-success"></i>' : '<i class="fas fa-clock text-warning"></i>';
            html += '<div class="d-flex justify-content-between align-items-center mb-2">' +
                '<span>' + icono + ' <strong>' + firmas[f].nombre + '</strong></span>' +
                '<span class="text-muted small">' + firmas[f].estado + '</span>' +
                '</div>';
        }
        
        html += '</div>';
        
        Swal.fire({ title: 'Auditoría del Descriptor', html: html, width: '650px', confirmButtonText: 'Cerrar', confirmButtonColor: '#0d6efd' });
    }
    
    function editarDescriptor(id) {
        console.log('Editando descriptor ID:', id);
        if (typeof DescriptorController !== 'undefined') {
            $('.nav-link').removeClass('active');
            $('.nav-link[data-modulo="nuevoDescriptor"]').addClass('active');
            DescriptorController.init(currentUser, id);
        } else {
            Swal.fire('Error', 'No se puede editar el descriptor', 'error');
        }
    }
    
    function verDescriptor(id) {
        if (typeof DescriptorService === 'undefined') return;
        var descriptor = DescriptorService.getById(id);
        if (!descriptor) return;
        var funcionesHtml = '';
        if (descriptor.funcionesClaves && descriptor.funcionesClaves.length > 0) {
            funcionesHtml = '<ul>';
            for (var i = 0; i < descriptor.funcionesClaves.length; i++) {
                funcionesHtml += '<li><strong>' + (descriptor.funcionesClaves[i].codigo || '') + '</strong> - ' + (descriptor.funcionesClaves[i].nombre || '') + '</li>';
            }
            funcionesHtml += '</ul>';
        } else {
            funcionesHtml = '<p>No registradas</p>';
        }
        
        var observacionesHtml = '';
        if (descriptor.estado === 'OBSERVADO_JF' && descriptor.observacionesJF) {
            observacionesHtml = '<hr><div class="alert alert-warning"><i class="fas fa-comment"></i> <strong>Observaciones del Jefe Superior:</strong><br>' + descriptor.observacionesJF + '</div>';
        }
        if (descriptor.estado === 'OBSERVADO_TH' && descriptor.observacionesTH) {
            observacionesHtml = '<hr><div class="alert alert-warning"><i class="fas fa-comment"></i> <strong>Observaciones de Talento Humano:</strong><br>' + descriptor.observacionesTH + '</div>';
        }
        
        var html = '<div class="text-start">' +
            '<h6 class="border-bottom pb-2">Información General</h6>' +
            '<p><strong>Código:</strong> ' + (descriptor.codigo || 'DES-' + id) + '</p>' +
            '<p><strong>Puesto:</strong> ' + (descriptor.puesto || '-') + '</p>' +
            '<p><strong>Área:</strong> ' + (descriptor.area || '-') + '</p>' +
            '<p><strong>Reporta a:</strong> ' + (descriptor.reportaA || '-') + '</p>' +
            '<p><strong>Estado:</strong> ' + (descriptor.estado || 'BORRADOR') + '</p>' +
            '<hr>' +
            '<h6 class="border-bottom pb-2">Objetivo</h6>' +
            '<p>' + (descriptor.objetivo || '-') + '</p>' +
            '<hr>' +
            '<h6 class="border-bottom pb-2">Funciones Claves</h6>' + funcionesHtml +
            observacionesHtml + '</div>';
        
        Swal.fire({ title: 'Descriptor: ' + descriptor.puesto, html: html, width: '600px', confirmButtonText: 'Cerrar', confirmButtonColor: '#0d6efd' });
    }
    
    function enviarDescriptor(id) {
        Swal.fire({ title: '¿Enviar a Jefe Superior?', text: 'Una vez enviado, el Jefe Superior podrá revisar y aprobar el descriptor.', icon: 'question', showCancelButton: true, confirmButtonText: 'Sí, enviar', confirmButtonColor: '#0d6efd' })
            .then(function(result) {
                if (result.isConfirmed) {
                    var currentUserGlobal = JSON.parse(sessionStorage.getItem('currentUser') || '{}');
                    var descriptorActual = DescriptorService.getById(id);
                    if (descriptorActual) {
                        descriptorActual.estado = 'ENVIADO_JF';
                        DescriptorService.update(id, descriptorActual);
                        DescriptorService.registrarEvento(id, { accion: 'ENVÍO A JEFE SUPERIOR', usuario: currentUserGlobal.nombre, rol: currentUserGlobal.rolNombre, estado: 'ENVIADO_JF' });
                        Swal.fire('Enviado', 'Descriptor enviado al Jefe Superior', 'success');
                        cargarDescriptores();
                    }
                }
            });
    }
    
    function enviarDescriptorATH(id) {
        Swal.fire({ title: '¿Enviar a Talento Humano?', text: 'Una vez enviado, el equipo de Talento Humano podrá revisar el descriptor.', icon: 'question', showCancelButton: true, confirmButtonText: 'Sí, enviar', confirmButtonColor: '#198754' })
            .then(function(result) {
                if (result.isConfirmed) {
                    var currentUserGlobal = JSON.parse(sessionStorage.getItem('currentUser') || '{}');
                    var descriptorActual = DescriptorService.getById(id);
                    if (descriptorActual) {
                        descriptorActual.estado = 'ENVIADO_TH';
                        DescriptorService.update(id, descriptorActual);
                        DescriptorService.registrarEvento(id, { accion: 'ENVÍO A TALENTO HUMANO', usuario: currentUserGlobal.nombre, rol: currentUserGlobal.rolNombre, estado: 'ENVIADO_TH' });
                        Swal.fire('Enviado', 'Descriptor enviado a Talento Humano', 'success');
                        cargarDescriptores();
                    }
                }
            });
    }
    
    function enviarDescriptorATHDesdeObservado(id) {
        Swal.fire({ title: '¿Reenviar a Talento Humano?', text: 'Una vez enviado, Talento Humano podrá revisar las correcciones.', icon: 'question', showCancelButton: true, confirmButtonText: 'Sí, reenviar', confirmButtonColor: '#198754' })
            .then(function(result) {
                if (result.isConfirmed) {
                    var currentUserGlobal = JSON.parse(sessionStorage.getItem('currentUser') || '{}');
                    var descriptorActual = DescriptorService.getById(id);
                    if (descriptorActual) {
                        descriptorActual.estado = 'ENVIADO_TH';
                        DescriptorService.update(id, descriptorActual);
                        DescriptorService.registrarEvento(id, { accion: 'REENVÍO A TALENTO HUMANO (DESPUÉS DE CORRECCIÓN)', usuario: currentUserGlobal.nombre, rol: currentUserGlobal.rolNombre, estado: 'ENVIADO_TH' });
                        Swal.fire('Reenviado', 'Descriptor reenviado a Talento Humano', 'success');
                        cargarDescriptores();
                    }
                }
            });
    }
    
    function firmarDescriptorJI(id) {
        var descriptor = DescriptorService.getById(id);
        if (!descriptor) return;
        
        var modalHtml = '<div class="text-center"><div id="signature-pad" class="signature-pad border rounded mx-auto" style="width: 400px; height: 200px; border: 2px solid #ccc;"><canvas id="firmaCanvas" width="400" height="200" style="width: 100%; height: 100%;"></canvas></div><div class="mt-3"><button id="limpiarFirma" class="btn btn-secondary btn-sm"><i class="fas fa-eraser"></i> Limpiar</button><button id="descargarFirma" class="btn btn-info btn-sm"><i class="fas fa-download"></i> Descargar Firma</button></div></div>';
        
        Swal.fire({ title: 'Firma Digital - Jefe Inmediato', html: modalHtml, width: '500px', showCancelButton: true, confirmButtonText: '<i class="fas fa-save"></i> Guardar Firma', cancelButtonText: 'Cancelar',
            didOpen: function() {
                var canvas = document.getElementById('firmaCanvas');
                var signaturePad = new SignaturePad(canvas);
                $('#limpiarFirma').click(function() { signaturePad.clear(); });
                $('#descargarFirma').click(function() {
                    if (signaturePad.isEmpty()) { Swal.fire('Advertencia', 'No hay firma para descargar', 'warning'); return; }
                    var link = document.createElement('a');
                    link.download = 'firma_ji_' + id + '.png';
                    link.href = signaturePad.toDataURL('image/png');
                    link.click();
                });
                window.currentSignaturePad = signaturePad;
            },
            preConfirm: function() {
                if (window.currentSignaturePad && window.currentSignaturePad.isEmpty()) {
                    Swal.showValidationMessage('Debe dibujar una firma');
                    return false;
                }
                return window.currentSignaturePad.toDataURL('image/png');
            }
        }).then(function(result) {
            if (result.isConfirmed && result.value) {
                var currentUserGlobal = JSON.parse(sessionStorage.getItem('currentUser') || '{}');
                var firmasGuardadas = JSON.parse(localStorage.getItem('firmas')) || {};
                firmasGuardadas['ji_' + id] = result.value;
                localStorage.setItem('firmas', JSON.stringify(firmasGuardadas));
                var descriptorActual = DescriptorService.getById(id);
                if (descriptorActual) {
                    descriptorActual.estado = 'FIRMADO';
                    descriptorActual.firmaJI = result.value;
                    descriptorActual.fechaFirmaJI = new Date().toISOString();
                    DescriptorService.update(id, descriptorActual);
                    DescriptorService.registrarEvento(id, { accion: 'FIRMA DEL JEFE INMEDIATO', usuario: currentUserGlobal.nombre, rol: currentUserGlobal.rolNombre, estado: 'FIRMADO' });
                    Swal.fire('Firmado', 'Descriptor firmado exitosamente', 'success');
                    cargarDescriptores();
                }
            }
        });
    }
    
    $('#searchInput').off('keyup').on('keyup', filtrarYMostrar);
    $('#estadoFilter').off('change').on('change', filtrarYMostrar);
    $('#sortBy').off('change').on('change', filtrarYMostrar);
    $('#btnNuevoDescriptor').off('click').on('click', function() { if (typeof window.cargarNuevoDescriptor === 'function') window.cargarNuevoDescriptor(); });
    
    cargarDescriptores();
};

if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', window.initDescriptorList);
} else {
    setTimeout(window.initDescriptorList, 50);
}
</script>
</body>
</html>
