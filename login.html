<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Login - Descriptor de Puesto</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* Solo animaciones y ajustes específicos, el resto con Bootstrap */
        body {
            background: linear-gradient(135deg, #0d6efd 0%, #0dcaf0 100%);
            min-height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        .login-card {
            animation: fadeInUp 0.6s ease;
            border: none;
            border-radius: 20px;
            overflow: hidden;
        }
        
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .btn-login {
            background: linear-gradient(135deg, #0d6efd 0%, #0dcaf0 100%);
            border: none;
            padding: 12px;
            font-weight: 600;
            transition: transform 0.3s, box-shadow 0.3s;
        }
        
        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(13, 110, 253, 0.4);
        }
        
        .demo-users {
            background: #e7f3ff;
            border-radius: 12px;
            border-left: 4px solid #0d6efd;
        }
        
        .user-badge {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 600;
            margin: 3px;
        }
        
        .badge-jefe { background: #0d6efd; color: white; }
        .badge-th { background: #198754; color: white; }
        .badge-colaborador { background: #ffc107; color: #000; }
        .badge-gerente { background: #6f42c1; color: white; }
        
        /* Responsive ajustes */
        @media (max-width: 576px) {
            .login-header { padding: 30px 20px; }
            .login-body { padding: 30px 20px; }
            .login-header h3 { font-size: 1.3rem; }
            .demo-users { font-size: 12px; }
        }
    </style>
</head>
<body class="d-flex align-items-center">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-12 col-sm-10 col-md-8 col-lg-5">
                <div class="card login-card shadow-lg">
                    <div class="card-header login-header text-white text-center border-0" style="background: linear-gradient(135deg, #0d6efd 0%, #0dcaf0 100%);">
                        <i class="fas fa-clipboard-list fa-3x mb-3"></i>
                        <h3 class="mb-0">Descriptor y Perfil de Puesto</h3>
                        <p class="mt-2 mb-0 opacity-75">Sistema Integrado de Talento Humano</p>
                    </div>
                    <div class="card-body p-4 p-sm-5">
                        <div class="demo-users p-3 mb-4">
                            <i class="fas fa-info-circle text-primary me-2"></i> <strong>Demo - Usuarios:</strong>
                            <div class="mt-2">
                                <span class="user-badge badge-jefe"><i class="fas fa-user-tie"></i> juan.hercules</span>
                                <span class="user-badge badge-gerente"><i class="fas fa-chart-line"></i> roberto.chang</span>
                                <span class="user-badge badge-th"><i class="fas fa-handshake"></i> ana.lopez</span>
                                <span class="user-badge badge-th"><i class="fas fa-gavel"></i> carlos.gomez</span>
                                <span class="user-badge badge-colaborador"><i class="fas fa-user"></i> juan.perez</span>
                            </div>
                            <small class="text-muted mt-2 d-block"><i class="fas fa-key"></i> Contraseña para todos: <strong>123456</strong></small>
                        </div>

                        <form id="loginForm">
                            <div class="form-floating mb-3">
                                <input type="text" class="form-control" id="username" placeholder="Usuario" required>
                                <label><i class="fas fa-user me-2 text-secondary"></i>Usuario</label>
                            </div>
                            <div class="form-floating mb-4">
                                <input type="password" class="form-control" id="password" placeholder="Contraseña" required>
                                <label><i class="fas fa-lock me-2 text-secondary"></i>Contraseña</label>
                            </div>
                            <button type="submit" class="btn btn-login w-100 text-white">
                                <i class="fas fa-sign-in-alt me-2"></i>Ingresar al Sistema
                            </button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script>
        const users = {
            'juan.hercules': { nombre: 'Ing. Juan Hércules', password: '123456', rol: 'JEFE_INMEDIATO', rolNombre: 'Jefe Inmediato', area: 'Subgerencia TI' },
            'roberto.chang': { nombre: 'Dr. Roberto Chang', password: '123456', rol: 'JEFE_SUPERIOR', rolNombre: 'Jefe Superior', area: 'Gerencia General' },
            'ana.lopez': { nombre: 'Licda. Ana López', password: '123456', rol: 'TH_GENERALISTA', rolNombre: 'TH Generalista', area: 'Talento Humano' },
            'carlos.gomez': { nombre: 'Lic. Carlos Gómez', password: '123456', rol: 'JEFE_TH', rolNombre: 'Jefe de TH', area: 'Talento Humano' },
            'juan.perez': { nombre: 'Ing. Juan Pérez', password: '123456', rol: 'COLABORADOR', rolNombre: 'Colaborador', area: 'Analista Programador' }
        };

        $('#loginForm').submit(function(e) {
            e.preventDefault();
            const username = $('#username').val().toLowerCase().trim();
            const password = $('#password').val();
            
            if (users[username] && users[username].password === password) {
                sessionStorage.setItem('currentUser', JSON.stringify({ ...users[username], usuario: username }));
                window.location.href = 'index.html';
            } else {
                Swal.fire({
                    icon: 'error',
                    title: 'Error de autenticación',
                    text: 'Usuario o contraseña incorrectos',
                    confirmButtonColor: '#0d6efd'
                });
            }
        });
    </script>
</body>
</html>
