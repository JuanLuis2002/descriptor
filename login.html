<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SGUEES - Login Autorización</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        body { background-color: #f4f6f9; }
        .login-card { max-width: 480px; width: 100%; border-radius: 12px; }
    </style>
</head>
<body class="d-flex align-items-center justify-content-center vh-100">

    <div class="card login-card shadow border-0">
        <div class="card-body p-5">
            <div class="text-center mb-4">
                <i class="bi bi-shield-lock-fill fs-1 text-primary"></i>
                <h4 class="fw-bold mt-2 text-dark">Portal SGUEES</h4>
                <p class="text-muted small">Gestión de Descriptores y Perfiles de Puesto</p>
            </div>
            
            <form id="formLogin">
                <div class="mb-4">
                    <label for="usuarioSelect" class="form-label fw-bold text-secondary small text-uppercase">Seleccione su Rol e Identidad (UEES)</label>
                    <select class="form-select form-select-lg fs-6" id="usuarioSelect" required>
                        <option value="" disabled selected>Elegir usuario para el simulador...</option>
                        <optgroup label="Línea Jerárquica TI / Operaciones">
                            <option value="1">Ing. Juan Hércules (Jefe de Subgerencia de TI - Creador)</option>
                            <option value="2">Dr. Roberto Chang (Gerente General - Jefe Superior)</option>
                        </optgroup>
                        <optgroup label="Talento Humano (Revisión Legal y Técnica)">
                            <option value="3">Licda. Ana López (TH Generalista - Revisor)</option>
                            <option value="4">Lic. Carlos Gómez (Jefe de Talento Humano - Validador)</option>
                        </optgroup>
                        <optgroup label="Titulares de Puesto">
                            <option value="5">Ing. Juan Pérez (Analista Programador - Empleado / Firma)</option>
                        </optgroup>
                    </select>
                </div>
                
                <button type="submit" class="btn btn-primary w-100 py-2 fw-bold">
                    Ingresar al Sistema <i class="bi bi-box-arrow-in-right ms-1"></i>
                </button>
            </form>
        </div>
    </div>

    <script>
        // Mapeo estricto de la estructura organizativa UEES
        const usuariosDemo = {
            "1": {
                nombre: "Ing. Juan Hércules",
                rol: "JEFE_INMEDIATO",
                cargo: "Jefe de Subgerencia de TI",
                permisos: ["CREAR_BORRADOR", "VER_FORMATO_CORTO", "ENVIAR_A_SUPERIOR"]
            },
            "2": {
                nombre: "Dr. Roberto Chang",
                rol: "JEFE_SUPERIOR",
                cargo: "Gerente General",
                permisos: ["VER_FORMATO_CORTO", "APROBAR_JEFE_SUPERIOR", "RECHAZAR_A_BORRADOR"]
            },
            "3": {
                nombre: "Licda. Ana López",
                rol: "TALENTO_HUMANO_REVISOR",
                cargo: "TH Generalista",
                permisos: ["VER_FORMATO_LARGO", "EDITAR_INTEGRADO", "COMPLEMENTAR_REVISION"]
            },
            "4": {
                nombre: "Lic. Carlos Gómez",
                rol: "JEFE_TALENTO_HUMANO",
                cargo: "Jefe de Talento Humano",
                permisos: ["VER_FORMATO_LARGO", "VALIDAR_TECNICA", "FIRMA_DIGITAL_TH"]
            },
            "5": {
                nombre: "Ing. Juan Pérez",
                rol: "COLABORADOR",
                cargo: "Analista Programador",
                permisos: ["VER_FORMATO_CORTO", "FIRMA_DIGITAL_TITULAR"]
            }
        };

        document.getElementById('formLogin').addEventListener('submit', function(e) {
            e.preventDefault();
            const id = document.getElementById('usuarioSelect').value;
            const usr = usuariosDemo[id];

            if (usr) {
                // Forzar limpieza antes de registrar la nueva sesión para evitar residuos de caché
                sessionStorage.clear();
                
                sessionStorage.setItem('sesion_activa', 'true');
                sessionStorage.setItem('usuario_nombre', usr.nombre);
                sessionStorage.setItem('usuario_rol', usr.rol);
                sessionStorage.setItem('usuario_cargo', usr.cargo);
                sessionStorage.setItem('usuario_permisos', JSON.stringify(usr.permisos));
                
                window.location.href = 'index.html';
            }
        });

        // Guardia preventiva en el login
        window.onload = () => {
            if (sessionStorage.getItem('sesion_activa') === 'true') {
                window.location.href = 'index.html';
            }
        };
    </script>
</body>
</html>
