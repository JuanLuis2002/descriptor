<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Descriptor de Puesto</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .login-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .login-card {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            overflow: hidden;
            max-width: 450px;
            width: 100%;
            animation: fadeInUp 0.6s ease;
        }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .login-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 40px;
            text-align: center;
        }
        .login-header h3 { margin: 0; font-weight: 600; }
        .login-header p { margin: 10px 0 0; opacity: 0.9; }
        .login-body { padding: 40px; }
        .form-floating { margin-bottom: 20px; }
        .btn-login {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            padding: 12px;
            font-weight: 600;
            width: 100%;
            color: white;
        }
        .btn-login:hover { transform: translateY(-2px); }
        .demo-users {
            background: #f8f9fa;
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 20px;
            font-size: 13px;
        }
        .user-badge {
            display: inline-block;
            padding: 4px 8px;
            border-radius: 5px;
            font-size: 11px;
            font-weight: 600;
            margin: 3px;
        }
        .badge-jefe { background: #0d6efd; color: white; }
        .badge-th { background: #198754; color: white; }
        .badge-colaborador { background: #ffc107; color: #000; }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div class="login-header">
                <i class="fas fa-clipboard-list fa-3x mb-3"></i>
                <h3>Descriptor y Perfil de Puesto</h3>
                <p>Sistema Integrado de Talento Humano</p>
            </div>
            <div class="login-body">
                <div class="demo-users">
                    <i class="fas fa-info-circle"></i> <strong>Demo - Usuarios:</strong><br>
                    <span class="user-badge badge-jefe">juan.hercules (Jefe)</span>
                    <span class="user-badge badge-jefe">roberto.chang (Jefe Superior)</span>
                    <span class="user-badge badge-th">ana.lopez (TH)</span>
                    <span class="user-badge badge-th">carlos.gomez (Jefe TH)</span>
                    <span class="user-badge badge-colaborador">juan.perez (Colaborador)</span>
                    <br><small class="text-muted">Contraseña para todos: <strong>123456</strong></small>
                </div>

                <form id="loginForm">
                    <div class="form-floating mb-3">
                        <input type="text" class="form-control" id="username" placeholder="Usuario" required>
                        <label><i class="fas fa-user me-2"></i>Usuario</label>
                    </div>
                    <div class="form-floating mb-4">
                        <input type="password" class="form-control" id="password" placeholder="Contraseña" required>
                        <label><i class="fas fa-lock me-2"></i>Contraseña</label>
                    </div>
                    <button type="submit" class="btn btn-login">
                        <i class="fas fa-sign-in-alt me-2"></i>Ingresar
                    </button>
                </form>
            </div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script>
        const users = {
            'juan.hercules': { nombre: 'Ing. Juan Hércules', password: '123456', rol: 'JEFE_INMEDIATO', rolNombre: 'Jefe Inmediato', area: 'Subgerencia TI' },
            'roberto.chang': { nombre: 'Dr. Roberto Chang', password: '123456', rol: 'JEFE_SUPERIOR', rolNombre: 'Jefe Superior', area: 'Gerencia General' },
            'ana.lopez': { nombre: 'Licda. Ana López', password: '123456', rol: 'TH_GENERALISTA', rolNombre: 'TH Generalista', area: 'Talento Humano' },
            'carlos.gomez': { nombre: 'Lic. Carlos Gómez', password: '123456', rol: 'JEFE_TH', rolNombre: 'Jefe de TH', area: 'Talento Humano' },
            'juan.perez': { nombre: 'Ing. Juan Pérez', password: '123456', rol: 'COLABORADOR', rolNombre: 'Colaborador', area: 'Analista Programador' }
        };

        $('#loginForm').submit(function(e) {
            e.preventDefault();
            const username = $('#username').val().toLowerCase();
            const password = $('#password').val();
            
            if (users[username] && users[username].password === password) {
                sessionStorage.setItem('currentUser', JSON.stringify({ ...users[username], usuario: username }));
                window.location.href = 'index.html';
            } else {
                Swal.fire({ icon: 'error', title: 'Error', text: 'Usuario o contraseña incorrectos' });
            }
        });
    </script>
</body>
</html>
